name: ubuntu22.04

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 22 * * *" # 每天中国标准时间(CST)上午6:00执行
  push:
    tags:
      - "*" # 当推送任何标签时触发

jobs:
  scripts-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.ACTIONS }}

      - name: preprocessing
        run: |
          sudo apt-get install -y dos2unix
          find -type f -name *.sh| xargs dos2unix
          find -type f -name *.sh| xargs chmod +x

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -e SC1071
        with:
          severity: error

  build-image:
    strategy:
      matrix:
        include:
          - arch: "amd64"
            runner: "ubuntu-24.04"
          - arch: "arm64"
            runner: "ubuntu-24.04-arm"
    runs-on: ${{ matrix.runner }}
    needs: [scripts-verify]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.ACTIONS }}

      - name: Grant execution permissions
        run: |
          sudo apt-get install -y dos2unix
          find -type f -name *.sh| xargs dos2unix
          find -type f -name *.sh| xargs chmod +x

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to official hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: dockerfiles/os/ubuntu
          file: dockerfiles/os/ubuntu/ubuntu22.04.dockerfile
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: |
            sqjian/venv:ubuntu22.04-${{ matrix.arch }}
            sqjian/venv:ubuntu22.04-${{ matrix.arch }}-${{ steps.date.outputs.date }}
          provenance: false

  create-manifest:
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Login to official hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push multi-arch manifest for Docker Hub
        run: |
          docker manifest create --amend sqjian/venv:ubuntu22.04 \
            sqjian/venv:ubuntu22.04-amd64 \
            sqjian/venv:ubuntu22.04-arm64
          docker manifest push sqjian/venv:ubuntu22.04
          docker manifest create --amend sqjian/venv:ubuntu22.04-${{ steps.date.outputs.date }} \
            sqjian/venv:ubuntu22.04-amd64-${{ steps.date.outputs.date }} \
            sqjian/venv:ubuntu22.04-arm64-${{ steps.date.outputs.date }}
          docker manifest push sqjian/venv:ubuntu22.04-${{ steps.date.outputs.date }}
