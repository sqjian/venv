name: ubuntu22.04-cuda13.2

on:
  workflow_dispatch: {}

jobs:
  scripts-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.ACTIONS }}

      - name: preprocessing
        run: |
          sudo apt-get install -y dos2unix
          find -type f -name *.sh| xargs dos2unix
          find -type f -name *.sh| xargs chmod +x

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -e SC1071
        with:
          severity: error

  build-image:
    runs-on: ubuntu-24.04
    needs: [scripts-verify]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.ACTIONS }}

      - name: Grant execution permissions
        run: |
          sudo apt-get install -y dos2unix
          find -type f -name *.sh| xargs dos2unix
          find -type f -name *.sh| xargs chmod +x

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to official hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Build and push
        timeout-minutes: 60
        run: |
          docker buildx build \
            --push \
            --platform linux/amd64 \
            --provenance=false \
            --tag sqjian/venv:ubuntu22.04-cuda13.2 \
            --tag sqjian/venv:ubuntu22.04-cuda13.2-${{ steps.date.outputs.date }} \
            --file dockerfiles/os/ubuntu/ubuntu22.04-cuda13.2.dockerfile \
            dockerfiles/os/ubuntu
