name: "venv_devcontainer"

x-common-config: &common-config
  image: artifacts.iflytek.com/docker-private/aiaas/venv:ubuntu22.04-cuda13.2
  pull_policy: always
  restart: "no"
  privileged: true
  ulimits:
    memlock: -1
    stack: -1
    core: 0
    nproc: 65535
    nofile:
      soft: 65535
      hard: 65535
  ipc: host
  network_mode: "host"
  volumes:
    - /etc/localtime:/etc/localtime:ro
    - /mnt:/mnt:rw
    - /sqjian/.ssh:/root/.ssh:rw
    - /var/run/docker.sock:/var/run/docker.sock:rw
    - uv_cache:/root/.cache/uv
    - uv_python:/root/.local/share/uv/python
    - vscode_extensions:/root/.vscode-server/extensions
    - linuxbrew:/home/linuxbrew
    - models:/mnt/models
    - datasets:/mnt/datasets
    - /mnt/ramdisk:/mnt/ramdisk:rw
    - fish:/root/.local/share/fish
    - codex:/root/.codex
    - pre_commit:/root/.cache/pre-commit
    - claude:/root/.claude
    - pi:/root/.pi
    - /sqjian/.claude.json:/root/.claude.json:rw
    - ./../../:/workspaces
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: [ "0", "1", "2", "3", "4", "5", "6", "7" ]
            capabilities: [ gpu ]
    update_config:
      parallelism: 1

services:
  workspace:
    <<: *common-config
    container_name: venv-workspace-devcontainer
    hostname: venv-workspace
    entrypoint: [ "bash", "-l", "-c" ]
    command:
      - |
        sleep infinity

volumes:
  uv_cache: { external: true }
  uv_python: { external: true }
  vscode_extensions: { external: true }
  models: { external: true }
  datasets: { external: true }
  linuxbrew: { external: true }
  fish: { external: true }
  codex: { external: true }
  pre_commit: { external: true }
  claude: { external: true }
  pi: { external: true }
