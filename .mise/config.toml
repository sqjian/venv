[settings]
env_shell_expand = true

[env]
_.path = ["/root/.local/bin", "{{config_root}}/.venv/bin", "/root/.cargo/bin"]
LIBRARY_PATH = "${LIBRARY_PATH:-}:/usr/local/cuda/lib64"
LD_LIBRARY_PATH = "${LD_LIBRARY_PATH:-}:/usr/local/cuda/lib64:/usr/local/lib"
VIRTUAL_ENV = "{{config_root}}/.venv"

# git (docker: default ssh + /root config, macos: $HOME, linux: /sqjian)
GIT_SSH_COMMAND = "{{ exec(command='[ -e /.dockerenv ] && echo ssh || ([ \"$(uname)\" = \"Darwin\" ] && echo \"ssh -i $HOME/.ssh/id_ecdsa\" || echo \"ssh -i /sqjian/.ssh/id_ecdsa\")') }}"
GIT_CONFIG_GLOBAL = "{{ exec(command='[ -e /.dockerenv ] && echo /root/.config/git/config || ([ \"$(uname)\" = \"Darwin\" ] && echo $HOME/.config/git/config || echo /sqjian/.config/git/config)') }}"

[shell_alias]
cx = "codex"
cx-danger = "codex --dangerously-bypass-approvals-and-sandbox"
cc = "claude --permission-mode acceptEdits"
cc-danger = "IS_SANDBOX=1 claude --dangerously-skip-permissions"
gl = "git log --graph --decorate --date=iso"
gs = "git status"
gc = "git commit"

[task_config]
includes = [
  "~/.config/mise/tasks",
  ".mise/tasks",
]
